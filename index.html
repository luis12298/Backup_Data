<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="shortcut icon" href="icon.png" type="image/x-icon">
   <title>Respaldo Cuentas</title>
   <style>
      body {
         background-color: #0838a0;
         display: flex;
         justify-content: center;
         align-items: center;
         max-width: 300px;
         max-height: 300px;
         font-family: Arial, sans-serif;
      }

      .login-container {
         position: relative;
         background-color: #ffffff;
         margin-top: -5px;
         padding: 2px 4px;
         border-radius: 10px;
         border: #02174e 2px solid;
         box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
         width: 250px;
      }

      .login-container h2 {
         margin-bottom: 10px;
         color: #1b0596;
         text-align: center;
      }

      ._input input {
         padding: 8px;
         margin: 5px 0;
         width: 100%;
         border: 1px solid #1245d1;
         border-radius: 10px;
         box-sizing: border-box;
      }

      ._input textarea {
         padding: 10px;
         margin: 5px 0 15px;
         width: 100%;
         border: 1px solid #1245d1;
         border-radius: 10px;
         box-sizing: border-box;
         resize: none;
      }

      ._input-a a {
         position: relative;
         top: -10px;
         width: 100%;
      }

      .login-container button {
         width: 100%;
         padding: 12px;
         background-color: #0634b4;
         color: #ffffff;
         border: none;
         border-radius: 20px;
         cursor: pointer;
         font-size: 16px;
      }

      .login-container button:hover {
         background-color: #3157c0;
      }
   </style>
</head>

<body>
   <div class="login-container">
      <h2>Respaldar Cuenta</h2>
      <div class="_input">
         <input type="text" id="txtUsername" placeholder="Usuario o Correo" autocomplete="off">
      </div>
      <div class="_input">
         <input type="text" id="txtPassword" placeholder="Contraseña" autocomplete="off">
      </div>

      <div class="_input">
         <textarea name="" cols="25" rows="2" id="txtDescri" placeholder="Descripción: Ej. Cuenta google"></textarea>
      </div>
      <div class="_input-a">
         <a href="#" id="popup_datos">Mostrar Datos</a>
      </div>
      <button type="button" id="btnGuardar">Guardar</button>
   </div>
   <script src="firebase/firebase-app-compat.min.js"></script>
   <script src="firebase/firebase-database-compat.min.js"></script>
   <script src="controller.js"></script>
   <script src="script.js"></script>
</body>

</html>
